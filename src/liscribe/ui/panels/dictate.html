<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dictate</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body class="panel-dictate">

  <!-- ── Normal recording view ── -->
  <div id="view-recording">
    <span class="rec-dot"></span>
    <div class="waveform" id="waveform"></div>
    <span class="timer" id="timer">0:00</span>
  </div>

  <!-- ── Processing view (transcribing then pasting) ── -->
  <div id="view-processing">
    <div class="spinner"></div>
    <span class="label">Transcribing…</span>
  </div>

  <!-- ── Setup Required view (shown when permissions are missing) ── -->
  <div id="view-setup">
    <div>
      <h2 id="setup-title">Accessibility Required</h2>
      <p id="setup-body" class="mt-6">
        Dictate needs Accessibility permission to paste text into other apps.
      </p>
    </div>
    <ol id="setup-steps">
      <li>Open System Settings &rarr; Privacy &amp; Security</li>
      <li>Click Accessibility</li>
      <li>Enable Liscribe (or Python)</li>
      <li>Return here &mdash; Dictate will work straight away</li>
    </ol>
    <div class="setup-actions">
      <button class="btn btn-primary" id="btn-open-settings">Open Settings &rarr;</button>
      <button class="btn btn-ghost" id="btn-not-now">Not now</button>
      <button class="btn btn-ghost" id="btn-help">Help &rarr;</button>
    </div>
  </div>

  <script>
    const WAVEFORM_BAR_COUNT = 28;
    const POLL_INTERVAL_MS = 80;

    // ── Startup: detect setup_required query param ─────────────────────
    (function checkSetupRequired() {
      const params = new URLSearchParams(window.location.search);
      const missing = params.get('setup_required');
      if (!missing) return;

      const perms = missing.split(',').filter(Boolean);
      if (perms.length === 0) return;

      document.getElementById('view-recording').style.display = 'none';
      const setupView = document.getElementById('view-setup');
      setupView.style.display = 'flex';
      document.body.style.cssText =
        'display:flex;flex-direction:column;overflow:hidden;';

      const hasAccessibility = perms.indexOf('Accessibility') !== -1;
      const hasInputMonitoring = perms.indexOf('Input Monitoring') !== -1;

      const title = document.getElementById('setup-title');
      const body = document.getElementById('setup-body');
      const steps = document.getElementById('setup-steps');

      if (hasAccessibility && hasInputMonitoring) {
        title.textContent = 'Permissions Required';
        body.textContent =
          'Dictate needs Accessibility and Input Monitoring to paste text and listen for hotkeys.';
        const items = [
          'Open System Settings \u2192 Privacy & Security',
          'Enable Accessibility for Liscribe',
          'Enable Input Monitoring for Liscribe',
          'Return here \u2014 Dictate will work straight away',
        ];
        while (steps.firstChild) steps.removeChild(steps.firstChild);
        items.forEach(function(text) {
          const li = document.createElement('li');
          li.textContent = text;
          steps.appendChild(li);
        });
      } else if (hasInputMonitoring) {
        title.textContent = 'Input Monitoring Required';
        body.textContent =
          'Dictate needs Input Monitoring permission to listen for the hotkey trigger.';
        const items = [
          'Open System Settings \u2192 Privacy & Security',
          'Click Input Monitoring',
          'Enable Liscribe (or Python)',
          'Return here \u2014 Dictate will work straight away',
        ];
        while (steps.firstChild) steps.removeChild(steps.firstChild);
        items.forEach(function(text) {
          const li = document.createElement('li');
          li.textContent = text;
          steps.appendChild(li);
        });
      }
    })();

    // ── Waveform setup ─────────────────────────────────────────────────
    function buildWaveformBars() {
      const wf = document.getElementById('waveform');
      while (wf.firstChild) wf.removeChild(wf.firstChild);
      for (var i = 0; i < WAVEFORM_BAR_COUNT; i++) {
        var bar = document.createElement('div');
        bar.className = 'waveform-bar';
        bar.style.height = '3px';
        wf.appendChild(bar);
      }
    }

    function formatTime(secs) {
      var s = Math.floor(secs);
      var m = Math.floor(s / 60);
      var ss = String(s % 60).padStart(2, '0');
      return m + ':' + ss;
    }

    async function updateWaveform() {
      try {
        var levels = await pywebview.api.get_waveform(WAVEFORM_BAR_COUNT);
        var bars = document.getElementById('waveform').querySelectorAll('.waveform-bar');
        for (var i = 0; i < levels.length; i++) {
          if (bars[i]) bars[i].style.height = Math.max(3, Math.round(levels[i] * 32)) + 'px';
        }
      } catch (e) { /* bridge not ready; degrade gracefully */ }
    }

    async function updateTimer() {
      try {
        var elapsed = await pywebview.api.get_elapsed();
        document.getElementById('timer').textContent = formatTime(elapsed);
      } catch (e) { /* bridge not ready; degrade gracefully */ }
    }

    async function updateStateView() {
      try {
        var state = await pywebview.api.get_state();
        var recEl = document.getElementById('view-recording');
        var procEl = document.getElementById('view-processing');
        if (state === 'recording') {
          recEl.style.display = 'flex';
          procEl.style.display = 'none';
        } else if (state === 'processing') {
          recEl.style.display = 'none';
          procEl.style.display = 'flex';
        }
      } catch (e) { /* bridge not ready */ }
    }

    var pollHandle = null;

    function startPolling() {
      if (pollHandle !== null) return;
      pollHandle = setInterval(function() {
        updateStateView();
        updateWaveform();
        updateTimer();
      }, POLL_INTERVAL_MS);
    }

    // ── Init ───────────────────────────────────────────────────────────
    window.addEventListener('pywebviewready', function() {
      buildWaveformBars();
      startPolling();
    });

    // Fallback: start polling after a short delay in case pywebviewready fired early.
    setTimeout(function() {
      if (pollHandle === null) {
        buildWaveformBars();
        startPolling();
      }
    }, 120);

    // ── Setup Required buttons ─────────────────────────────────────────
    document.getElementById('btn-not-now').addEventListener('click', function() {
      window.close();
    });

    document.getElementById('btn-open-settings').addEventListener('click', function() {
      var params = new URLSearchParams(window.location.search);
      var missing = (params.get('setup_required') || '').split(',').filter(Boolean);
      var pane = (missing.indexOf('Accessibility') !== -1)
        ? 'com.apple.preference.security?Privacy_Accessibility'
        : 'com.apple.preference.security?Privacy_ListenEvent';
      window.location.href = 'x-apple.systempreferences:' + pane;
    });

    document.getElementById('btn-help').addEventListener('click', function() {
      if (window.pywebview && window.pywebview.api && typeof window.pywebview.api.open_settings_help === 'function') {
        window.pywebview.api.open_settings_help('permissions');
      }
    });
  </script>
</body>
</html>
